name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to keep the queue moving.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Ruff lint + format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          # Cache is keyed on uv.lock by default; this repo is a library
          # and intentionally gitignores uv.lock, so caching is disabled.
          # Dep install (lxml + pytest + ruff) takes ~5s — not worth the
          # brittleness of caching against pyproject.toml hashes.
          enable-cache: false

      - name: Install ruff
        run: uv pip install --system "ruff>=0.6"

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

  test:
    name: pytest (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          # Cache is keyed on uv.lock by default; this repo is a library
          # and intentionally gitignores uv.lock, so caching is disabled.
          # Dep install (lxml + pytest + ruff) takes ~5s — not worth the
          # brittleness of caching against pyproject.toml hashes.
          enable-cache: false

      - name: Install project + dev deps
        run: uv pip install --system -e ".[dev]"

      - name: pytest
        run: pytest tests/ -v

      - name: Smoke — pbirb-mcp responds to JSON-RPC initialize
        # Sanity-check the entry point is wired correctly. A wheel that
        # builds but whose console script is broken would otherwise only
        # surface in a real LLM client.
        run: |
          printf '%s\n' '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{}}' \
            | timeout 5 pbirb-mcp \
            | tee /tmp/init.json
          grep -q '"name":"pbirb-mcp"' /tmp/init.json
